<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <title>%WEB_TITLE%</title>

    <!-- PWA & iOS Safari Standalone Meta Tags -->
    <meta name="theme-color" content="#0B0E1B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TeleVault" />

    <!-- PWA Icons & Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Service Worker Registration -->
    <script>
      try {
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js')
              .then(function(reg) {
                console.log('Service Worker registered:', reg.scope);
                if (reg && typeof reg.update === 'function') {
                  reg.update().catch(function() {});
                }
              })
              .catch(function(err) {
                console.error('Service Worker registration failed:', err);
              });
          });
        }
      } catch (e) {
        console.error('SW registration failed:', e);
      }
    </script>

    <!-- The `react-native-web` recommended style reset and premium visual enhancements -->
    <style id="expo-reset">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

      html,
      body {
        height: 100%;
        height: -webkit-fill-available;
        margin: 0;
        padding: 0;
        background-color: #0b0e1b;
        overscroll-behavior-y: contain; /* Disable pull-to-refresh */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* PWA Safe Area Classes */
      .safe-top {
        padding-top: max(env(safe-area-inset-top), 12px) !important;
      }
      .safe-bottom {
        padding-bottom: max(env(safe-area-inset-bottom), 12px) !important;
      }
      .safe-left {
        padding-left: max(env(safe-area-inset-left), 12px) !important;
      }
      .safe-right {
        padding-right: max(env(safe-area-inset-right), 12px) !important;
      }

      /* Force premium Outfit font across all React Native Web DOM nodes */
      div, span, p, input, textarea, button, a {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
      }

      /* Disable default browser tap-highlights & outline rings */
      * {
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* Premium Translucent Scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(11, 14, 27, 0.4);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(121, 134, 203, 0.35);
        border-radius: 8px;
        transition: background 0.3s ease;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(121, 134, 203, 0.6);
      }

      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        height: -webkit-fill-available;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
