name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Expo CLI dependencies
        run: npx expo --version

      - name: Prebuild iOS native project
        run: npx expo prebuild --platform ios --clean --non-interactive

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS app without code signing
        run: |
          cd ios
          xcodebuild \
            -workspace TeleVault.xcworkspace \
            -scheme TeleVault \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Create unsigned IPA
        run: |
          cd ios
          mkdir -p Payload
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -r TeleVault-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeleVault-unsigned-ipa
          path: ios/TeleVault-unsigned.ipa
